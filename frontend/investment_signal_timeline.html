<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>信号时间线</title>
    <style>
      :root {
        --bg: #f8fafc;
        --card: #ffffff;
        --text: #0f172a;
        --muted: #475569;
        --primary: #0f766e;
        --primary-dark: #115e59;
        --border: #d7dee6;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at 0% 0%, #dcfce7 0%, transparent 34%),
          radial-gradient(circle at 100% 100%, #dbeafe 0%, transparent 42%),
          var(--bg);
      }
      .wrap { max-width: 1280px; margin: 24px auto 40px; padding: 0 16px; }
      .panel { background: var(--card); border: 1px solid var(--border); border-radius: 18px; padding: 18px; }
      .topbar { display:flex; align-items:flex-start; justify-content:space-between; gap:16px; flex-wrap:wrap; }
      h1 { margin:0; font-size:28px; }
      .sub { margin-top:6px; color:var(--muted); font-size:14px; line-height:1.75; }
      .nav { display:flex; gap:10px; flex-wrap:wrap; }
      .nav a { color:var(--primary); text-decoration:none; font-size:14px; }
      .controls { margin-top:18px; display:grid; grid-template-columns:1fr 140px; gap:10px; }
      input, button { height:42px; border-radius:12px; border:1px solid var(--border); padding:0 12px; font-size:14px; background:#fff; }
      button { cursor:pointer; border:none; color:#fff; background:var(--primary); }
      button:hover { background:var(--primary-dark); }
      .meta { margin:12px 0; color:var(--muted); font-size:13px; min-height:18px; }
      .summary-grid { display:grid; grid-template-columns:repeat(5, minmax(0, 1fr)); gap:12px; }
      .summary-card { border:1px solid var(--border); border-radius:14px; padding:14px; background:linear-gradient(180deg,#ffffff 0%,#f8fafc 100%); }
      .summary-label { color:var(--muted); font-size:12px; }
      .summary-value { margin-top:6px; font-size:24px; font-weight:700; }
      .section { margin-top:16px; border:1px solid var(--border); border-radius:16px; padding:14px; background:#fff; }
      .section h3 { margin:0 0 12px; font-size:18px; }
      .logic-board { border:1px solid var(--border); border-radius:14px; padding:12px; background:linear-gradient(180deg,#ffffff 0%,#f8fafc 100%); }
      .logic-summary-grid { display:grid; grid-template-columns:repeat(3,minmax(0,1fr)); gap:10px; margin-bottom:12px; }
      .logic-summary-card { border:1px solid var(--border); border-radius:12px; padding:10px 12px; background:#fff; }
      .logic-summary-label { color:var(--muted); font-size:12px; margin-bottom:6px; }
      .logic-summary-value { font-size:13px; line-height:1.75; color:#0f172a; white-space:pre-wrap; }
      .logic-chain-list { display:grid; gap:10px; }
      .logic-chain-card { border:1px solid var(--border); border-radius:12px; padding:10px 12px; background:#fff; }
      .logic-chain-name { font-size:13px; font-weight:700; margin-bottom:8px; }
      .logic-nodes { display:flex; align-items:center; flex-wrap:wrap; gap:8px; }
      .logic-node { display:inline-flex; align-items:center; min-height:32px; padding:6px 10px; border-radius:999px; background:#ecfeff; border:1px solid #bae6fd; font-size:12px; font-weight:600; }
      .logic-arrow { color:#0f766e; font-weight:700; }
      .logic-chain-raw { margin-top:8px; font-size:12px; color:#64748b; line-height:1.7; }
      .evidence-chain { display:flex; flex-wrap:wrap; gap:8px; margin-top:10px; }
      .evidence-chip { display:inline-flex; align-items:center; gap:6px; min-height:30px; padding:6px 10px; border-radius:999px; border:1px solid #dbe4ec; background:#f8fafc; font-size:12px; color:#334155; }
      .evidence-chip strong { color:#0f172a; }
      .chart-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
      .mini-chart { border:1px solid var(--border); border-radius:14px; padding:12px; background:#f8fafc; min-height:220px; }
      .chart-title { font-size:14px; font-weight:700; margin-bottom:10px; }
      .bar-list { display:grid; gap:8px; }
      .bar-row { display:grid; grid-template-columns:120px 1fr 56px; align-items:center; gap:10px; font-size:12px; color:#334155; }
      .bar-track { height:12px; background:#e2e8f0; border-radius:999px; overflow:hidden; }
      .bar-fill { height:100%; border-radius:999px; background:linear-gradient(90deg,#0f766e,#22c55e); }
      .timeline { position:relative; padding-left:26px; display:grid; gap:12px; }
      .timeline::before { content:''; position:absolute; left:8px; top:4px; bottom:4px; width:2px; background:#cbd5e1; }
      .event-card { position:relative; border:1px solid var(--border); border-radius:14px; padding:12px; background:#fff; }
      .event-card::before { content:''; position:absolute; left:-23px; top:18px; width:10px; height:10px; border-radius:999px; background:#0f766e; border:2px solid #fff; box-shadow:0 0 0 2px #99f6e4; }
      .event-head { display:flex; justify-content:space-between; gap:12px; flex-wrap:wrap; }
      .event-title { font-size:15px; font-weight:700; }
      .event-meta { font-size:12px; color:#64748b; }
      .badge { display:inline-flex; align-items:center; padding:6px 10px; border-radius:999px; font-size:12px; font-weight:700; border:1px solid #d6dde7; background:#f8fafc; color:#334155; }
      .badge-strengthen { background:#14532d; color:#fff; border-color:#14532d; }
      .badge-weaken { background:#7c2d12; color:#fff; border-color:#7c2d12; }
      .badge-flip { background:#7e22ce; color:#fff; border-color:#7e22ce; }
      .badge-new { background:#0f766e; color:#fff; border-color:#0f766e; }
      .badge-expire { background:#475569; color:#fff; border-color:#475569; }
      .event-body { margin-top:8px; line-height:1.8; font-size:14px; color:#334155; }
      .event-kv { margin-top:8px; font-size:13px; color:#475569; line-height:1.8; }
      .evidence-list { display:grid; gap:8px; margin-top:10px; }
      .evidence-item { border:1px solid #e2e8f0; border-radius:12px; padding:10px 12px; background:#f8fafc; }
      .pager { margin-top:14px; display:flex; align-items:center; justify-content:space-between; gap:12px; }
      .pager button { width:90px; }
      .empty { border:1px dashed var(--border); border-radius:14px; padding:26px; text-align:center; color:var(--muted); }
      @media (max-width: 980px) {
        .summary-grid, .chart-grid, .controls, .logic-summary-grid { grid-template-columns:1fr; }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="panel">
        <div class="topbar">
          <div>
            <h1>信号时间线</h1>
            <div class="sub">查看单个投资信号从出现、强化、弱化到可能被证伪的完整演化过程。</div>
          </div>
          <div class="nav">
            <a href="/index.html">首页</a>
            <a href="/investment_signals.html">投资信号总览</a>
          </div>
        </div>

        <div class="controls">
          <input id="signal_key" placeholder="输入 signal_key，例如 stock:300353.SZ" />
          <button id="search_btn">查询时间线</button>
        </div>
        <div class="meta" id="meta">准备就绪</div>

        <div class="summary-grid" id="summary_grid" style="display:none;">
          <div class="summary-card"><div class="summary-label">主体</div><div class="summary-value" id="sum_subject">-</div></div>
          <div class="summary-card"><div class="summary-label">方向</div><div class="summary-value" id="sum_direction">-</div></div>
          <div class="summary-card"><div class="summary-label">当前强度</div><div class="summary-value" id="sum_strength">-</div></div>
          <div class="summary-card"><div class="summary-label">当前置信度</div><div class="summary-value" id="sum_confidence">-</div></div>
          <div class="summary-card"><div class="summary-label">当前状态</div><div class="summary-value" id="sum_status">-</div></div>
        </div>

        <div class="section">
          <h3>传导链路 / 证据链</h3>
          <div id="signal_logic"></div>
        </div>

        <div class="section">
          <h3>演化曲线</h3>
          <div class="chart-grid">
            <div class="mini-chart">
              <div class="chart-title">强度变化</div>
              <div class="bar-list" id="strength_chart"></div>
            </div>
            <div class="mini-chart">
              <div class="chart-title">置信度变化</div>
              <div class="bar-list" id="confidence_chart"></div>
            </div>
          </div>
        </div>

        <div class="section">
          <h3>事件时间线</h3>
          <div class="timeline" id="timeline"></div>
          <div class="pager">
            <button id="prev_btn">上一页</button>
            <div id="page_info">第 1 / 1 页</div>
            <button id="next_btn">下一页</button>
          </div>
        </div>
      </div>
    </div>

    <script>
      const API_BASE = (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1')
        ? 'http://127.0.0.1:8077'
        : `http://${window.location.hostname}:8077`;

      const state = { signal_key: '', page: 1, page_size: 20, total_pages: 1, total: 0 };
      const els = {
        signal_key: document.getElementById('signal_key'),
        search_btn: document.getElementById('search_btn'),
        meta: document.getElementById('meta'),
        signal_logic: document.getElementById('signal_logic'),
        summary_grid: document.getElementById('summary_grid'),
        sum_subject: document.getElementById('sum_subject'),
        sum_direction: document.getElementById('sum_direction'),
        sum_strength: document.getElementById('sum_strength'),
        sum_confidence: document.getElementById('sum_confidence'),
        sum_status: document.getElementById('sum_status'),
        strength_chart: document.getElementById('strength_chart'),
        confidence_chart: document.getElementById('confidence_chart'),
        timeline: document.getElementById('timeline'),
        prev_btn: document.getElementById('prev_btn'),
        next_btn: document.getElementById('next_btn'),
        page_info: document.getElementById('page_info'),
      };

      function escapeHtml(str) {
        return String(str || '')
          .replaceAll('&', '&amp;')
          .replaceAll('<', '&lt;')
          .replaceAll('>', '&gt;')
          .replaceAll('"', '&quot;')
          .replaceAll("'", '&#39;');
      }

      function parseJsonList(raw) {
        if (!raw) return [];
        try {
          const obj = JSON.parse(raw);
          return Array.isArray(obj) ? obj : [];
        } catch (_) {
          return [];
        }
      }

      function displayEventType(value) {
        const map = {
          new_signal: '新信号',
          strengthen: '信号增强',
          weaken: '信号减弱',
          flip: '方向反转',
          falsify: '原判断被证伪',
          revive: '信号恢复',
          expire: '信号失效',
          status_change: '状态变化',
        };
        return map[String(value || '').trim()] || String(value || '-');
      }

      function displayDriverType(value) {
        const map = {
          intl_news: '国际新闻',
          domestic_news: '国内新闻',
          news: '新闻',
          stock_news: '个股新闻',
          chatroom: '群聊',
          price: '价格',
          mixed: '混合驱动',
        };
        return map[String(value || '').trim()] || String(value || '-');
      }

      function badgeClass(eventType) {
        if (eventType === 'strengthen') return 'badge badge-strengthen';
        if (eventType === 'weaken') return 'badge badge-weaken';
        if (eventType === 'flip' || eventType === 'falsify' || eventType === 'revive') return 'badge badge-flip';
        if (eventType === 'new_signal') return 'badge badge-new';
        return 'badge badge-expire';
      }

      function updatePager() {
        els.page_info.textContent = `第 ${state.page} / ${Math.max(state.total_pages, 1)} 页`;
        els.prev_btn.disabled = state.page <= 1;
        els.next_btn.disabled = state.page >= state.total_pages;
      }

      function renderCharts(snapshots) {
        const points = (snapshots || []).slice().reverse();
        if (!points.length) {
          els.strength_chart.innerHTML = '<div class="empty">暂无快照</div>';
          els.confidence_chart.innerHTML = '<div class="empty">暂无快照</div>';
          return;
        }
        const maxStrength = Math.max(...points.map((x) => Number(x.signal_strength || 0)), 1);
        const maxConfidence = Math.max(...points.map((x) => Number(x.confidence || 0)), 1);
        els.strength_chart.innerHTML = points.map((p) => `
          <div class="bar-row">
            <div>${escapeHtml((p.snapshot_at || '').slice(5, 16).replace('T', ' '))}</div>
            <div class="bar-track"><div class="bar-fill" style="width:${Math.max(4, (Number(p.signal_strength || 0) / maxStrength) * 100)}%"></div></div>
            <div>${Number(p.signal_strength || 0).toFixed(1)}</div>
          </div>
        `).join('');
        els.confidence_chart.innerHTML = points.map((p) => `
          <div class="bar-row">
            <div>${escapeHtml((p.snapshot_at || '').slice(5, 16).replace('T', ' '))}</div>
            <div class="bar-track"><div class="bar-fill" style="width:${Math.max(4, (Number(p.confidence || 0) / maxConfidence) * 100)}%"></div></div>
            <div>${Number(p.confidence || 0).toFixed(1)}%</div>
          </div>
        `).join('');
      }

      function renderLogicBoard(logicView, emptyText = '暂无链路信息') {
        const summary = logicView?.summary || {};
        const chains = logicView?.chains || [];
        const evidenceChain = logicView?.evidence_chain || [];
        if (!chains.length && !summary.conclusion && !summary.focus && !summary.risk && !evidenceChain.length) {
          return `<div class="empty">${escapeHtml(emptyText)}</div>`;
        }
        return `
          <section class="logic-board">
            <div class="logic-summary-grid">
              <div class="logic-summary-card">
                <div class="logic-summary-label">核心结论</div>
                <div class="logic-summary-value">${escapeHtml(summary.conclusion || '暂无')}</div>
              </div>
              <div class="logic-summary-card">
                <div class="logic-summary-label">关注方向</div>
                <div class="logic-summary-value">${escapeHtml(summary.focus || '暂无')}</div>
              </div>
              <div class="logic-summary-card">
                <div class="logic-summary-label">风险提示</div>
                <div class="logic-summary-value">${escapeHtml(summary.risk || '暂无')}</div>
              </div>
            </div>
            <div class="logic-chain-list">
              ${chains.map((chain) => `
                <div class="logic-chain-card">
                  <div class="logic-chain-name">${escapeHtml(chain.title || '链路')}</div>
                  <div class="logic-nodes">
                    ${(chain.nodes || []).map((node, idx) => `
                      ${idx ? '<span class="logic-arrow">→</span>' : ''}
                      <span class="logic-node">${escapeHtml(node)}</span>
                    `).join('')}
                  </div>
                  <div class="logic-chain-raw">原始链路：${escapeHtml(chain.raw || '')}</div>
                </div>
              `).join('')}
            </div>
            ${evidenceChain.length ? `
              <div class="evidence-chain">
                ${evidenceChain.map((item) => `
                  <span class="evidence-chip">
                    <strong>${escapeHtml(item.label || '-')}</strong>
                    <span>${escapeHtml(item.source || '-')}</span>
                    <span>${escapeHtml(item.direction || '-')}</span>
                    <span>${escapeHtml(item.date || '-')}</span>
                  </span>
                `).join('')}
              </div>
            ` : ''}
          </section>
        `;
      }

      function renderTimeline(events) {
        if (!events.length) {
          els.timeline.innerHTML = '<div class="empty">暂无事件记录。首次生成后，下一次跑脚本开始会逐步积累强化/弱化/反转事件。</div>';
          return;
        }
        els.timeline.innerHTML = events.map((ev) => {
          const evidences = parseJsonList(ev.evidence_json);
          return `
            <article class="event-card">
              <div class="event-head">
                <div class="event-title">${escapeHtml(ev.event_summary || ev.event_type || '')}</div>
                <div style="display:flex;gap:8px;flex-wrap:wrap;">
                  <span class="${badgeClass(ev.event_type)}">${escapeHtml(displayEventType(ev.event_type || '-'))}</span>
                  <span class="badge">${escapeHtml(ev.event_level || '-')}</span>
                </div>
              </div>
              <div class="event-meta">${escapeHtml(ev.event_time || '-')} | 驱动: ${escapeHtml(displayDriverType(ev.driver_type || '-'))} / ${escapeHtml(ev.driver_source || '-')}</div>
              <div class="event-body">${escapeHtml(ev.event_summary || '')}</div>
              <div class="event-kv">
                方向: ${escapeHtml(ev.old_direction || '-')} -> ${escapeHtml(ev.new_direction || '-')}<br />
                强度: ${Number(ev.old_strength || 0).toFixed(1)} -> ${Number(ev.new_strength || 0).toFixed(1)} (Δ ${Number(ev.delta_strength || 0).toFixed(1)})<br />
                置信度: ${Number(ev.old_confidence || 0).toFixed(1)}% -> ${Number(ev.new_confidence || 0).toFixed(1)}% (Δ ${Number(ev.delta_confidence || 0).toFixed(1)}%)<br />
                事件后状态: ${escapeHtml(ev.status_after_event || '-')}
              </div>
              <div style="margin-top:10px;">
                ${renderLogicBoard(ev.logic_view || {}, '当前事件暂无可视化链路')}
              </div>
              ${evidences.length ? `
                <div class="evidence-list">
                  ${evidences.map((item) => `
                    <div class="evidence-item">
                      <div style="font-size:12px;color:#64748b;">${escapeHtml(item.source || '-')} | ${escapeHtml(item.direction || '-')} | ${escapeHtml(item.date || '-')}</div>
                      <div style="margin-top:6px;line-height:1.75;">${escapeHtml(item.title || item.group || '')}</div>
                    </div>
                  `).join('')}
                </div>
              ` : ''}
            </article>
          `;
        }).join('');
      }

      async function fetchData() {
        if (!state.signal_key) {
          els.meta.textContent = '请输入 signal_key';
          return;
        }
        const q = new URLSearchParams({
          signal_key: state.signal_key,
          page: String(state.page),
          page_size: String(state.page_size),
        });
        els.meta.textContent = '正在加载时间线...';
        try {
          const resp = await fetch(`${API_BASE}/api/investment-signals/timeline?${q.toString()}`);
          const data = await resp.json();
          if (!resp.ok) throw new Error(data.error || '请求失败');
          state.total = data.total || 0;
          state.total_pages = data.total_pages || 0;
          const signal = data.signal;
          if (signal) {
            els.summary_grid.style.display = 'grid';
            els.sum_subject.textContent = signal.subject_name || '-';
            els.sum_direction.textContent = signal.direction || '-';
            els.sum_strength.textContent = signal.signal_strength ?? '-';
            els.sum_confidence.textContent = `${signal.confidence ?? '-'}%`;
            els.sum_status.textContent = signal.signal_status || '-';
          } else {
            els.summary_grid.style.display = 'none';
          }
          els.signal_logic.innerHTML = renderLogicBoard(data.logic_view || signal?.logic_view || {}, '当前信号暂无形成链路');
          renderCharts(data.snapshots || []);
          renderTimeline(data.events || []);
          updatePager();
          els.meta.textContent = `共 ${state.total} 条事件，当前第 ${state.page} 页`;
        } catch (err) {
          els.meta.textContent = `查询失败: ${err.message}`;
          els.timeline.innerHTML = `<div class="empty">${escapeHtml(err.message)}</div>`;
          els.signal_logic.innerHTML = '';
          els.summary_grid.style.display = 'none';
          els.strength_chart.innerHTML = '';
          els.confidence_chart.innerHTML = '';
          state.total_pages = 0;
          updatePager();
        }
      }

      els.search_btn.addEventListener('click', () => {
        state.signal_key = els.signal_key.value.trim();
        state.page = 1;
        fetchData();
      });
      els.prev_btn.addEventListener('click', () => {
        if (state.page > 1) {
          state.page -= 1;
          fetchData();
        }
      });
      els.next_btn.addEventListener('click', () => {
        if (state.page < state.total_pages) {
          state.page += 1;
          fetchData();
        }
      });

      const params = new URLSearchParams(window.location.search);
      const signalKey = params.get('signal_key') || '';
      if (signalKey) {
        els.signal_key.value = signalKey;
        state.signal_key = signalKey;
        fetchData();
      }
    </script>
  </body>
</html>
