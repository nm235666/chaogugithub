<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>主题热点引擎</title>
    <style>
      :root {
        --bg:#f8fafc; --card:#fff; --text:#0f172a; --muted:#475569; --primary:#0f766e; --primary-dark:#115e59; --border:#d7dee6; --shadow:0 12px 30px rgba(15,23,42,.06);
      }
      *{box-sizing:border-box} body{margin:0;font-family:"Noto Sans SC","PingFang SC","Microsoft YaHei",sans-serif;color:var(--text);background:radial-gradient(circle at 0% 0%,#dcfce7 0%,transparent 34%),radial-gradient(circle at 100% 100%,#dbeafe 0%,transparent 42%),var(--bg)}
      .wrap{max-width:1400px;margin:24px auto 40px;padding:0 16px}.panel{background:var(--card);border:1px solid var(--border);border-radius:18px;box-shadow:var(--shadow);padding:18px}
      .topbar,.row,.card-head,.pill-list,.toolbar,.section-actions{display:flex;gap:12px;flex-wrap:wrap}.topbar,.card-head{align-items:flex-start;justify-content:space-between}
      h1{margin:0;font-size:28px}.sub,.meta,.muted{color:var(--muted);font-size:14px;line-height:1.7}.nav a{color:var(--primary);text-decoration:none;font-size:14px;margin-left:10px}
      .summary{margin-top:16px;display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px}.sum{border:1px solid var(--border);border-radius:14px;padding:14px;background:linear-gradient(180deg,#fff 0%,#f8fafc 100%)} .sum .v{font-size:26px;font-weight:700;margin-top:6px}
      .toolbar{margin-top:16px;display:grid;grid-template-columns:1.4fr repeat(4,140px) 110px;gap:10px} input,select,button{height:42px;border-radius:12px;border:1px solid var(--border);padding:0 12px;font-size:14px;background:#fff} button{border:none;background:var(--primary);color:#fff;cursor:pointer} button:hover{background:var(--primary-dark)}
      .section-actions{margin-top:16px;justify-content:flex-end}.ghost-btn{background:#f8fafc;color:var(--text);border:1px solid var(--border)}.ghost-btn:hover{background:#eef2f7}
      .list{margin-top:16px;display:grid;gap:12px}.card{border:1px solid var(--border);border-radius:16px;padding:16px;background:#fff}
      .title{font-size:20px;font-weight:700}.badge{display:inline-flex;align-items:center;padding:6px 10px;border-radius:999px;font-size:12px;font-weight:700;border:1px solid #d6dde7;background:#f8fafc;color:#334155}
      .bull{background:#14532d;color:#fff;border-color:#14532d}.bear{background:#7f1d1d;color:#fff;border-color:#7f1d1d}.heat{background:#0f766e;color:#fff;border-color:#0f766e}.state{background:#4338ca;color:#fff;border-color:#4338ca}
      .grid{display:grid;grid-template-columns:1.3fr 1fr 1fr;gap:12px;margin-top:12px}.box{border:1px solid var(--border);border-radius:14px;padding:12px;background:#f8fafc}.box h3{margin:0 0 10px;font-size:15px}
      .pill-list{gap:8px}.pill{display:inline-flex;gap:6px;align-items:center;padding:7px 10px;border-radius:999px;background:#fff;border:1px solid #dbe4ec;font-size:12px}
      .expect{display:grid;gap:8px}.expect-item{padding:10px;border:1px solid #dbe4ec;border-radius:12px;background:#fff}.expect-q{font-size:13px;line-height:1.6}.expect-m{margin-top:6px;font-size:12px;color:#64748b}
      .actions a{color:var(--primary);text-decoration:none;font-size:13px}.pager{margin-top:14px;display:flex;justify-content:space-between;align-items:center}.empty{padding:24px;text-align:center;color:var(--muted);border:1px dashed var(--border);border-radius:14px}
      @media (max-width:1100px){.summary,.grid,.toolbar{grid-template-columns:1fr 1fr}} @media (max-width:720px){.summary,.grid,.toolbar{grid-template-columns:1fr}}
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="panel">
        <div class="topbar">
          <div>
            <h1>主题热点引擎</h1>
            <div class="sub">把国际新闻、国内新闻、个股新闻、群聊信号归并成主题，并叠加状态机与 Polymarket 市场预期。</div>
          </div>
          <div class="nav">
            <a href="/index.html">首页</a>
            <a href="/investment_signals.html">投资信号</a>
            <a href="/research_reports.html">标准报告</a>
          </div>
        </div>

        <div class="summary">
          <div class="sum"><div class="muted">主题总数</div><div class="v" id="sum_total">-</div></div>
          <div class="sum"><div class="muted">看多主题</div><div class="v" id="sum_bull">-</div></div>
          <div class="sum"><div class="muted">看空主题</div><div class="v" id="sum_bear">-</div></div>
          <div class="sum"><div class="muted">高热度主题</div><div class="v" id="sum_heat">-</div></div>
        </div>

        <div class="toolbar">
          <input id="keyword" placeholder="搜索主题 / 关键词" />
          <select id="theme_group"><option value="">全部分组</option></select>
          <select id="direction"><option value="">全部方向</option></select>
          <select id="heat_level"><option value="">全部热度</option></select>
          <select id="state"><option value="">全部状态</option></select>
          <button id="search_btn">查询</button>
        </div>

        <div class="meta" id="meta">准备就绪</div>
        <div class="section-actions">
          <button id="download_image_btn" class="ghost-btn">下载当前列表图片</button>
        </div>
        <div class="list" id="list"></div>
        <div class="pager">
          <button id="prev_btn">上一页</button>
          <div id="page_info">第 1 / 1 页</div>
          <button id="next_btn">下一页</button>
        </div>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <script>
      const API_BASE=(location.hostname==='localhost'||location.hostname==='127.0.0.1')?'http://127.0.0.1:8077':`http://${location.hostname}:8077`;
      const state={keyword:'',theme_group:'',direction:'',heat_level:'',state_filter:'',page:1,page_size:20,total_pages:1};
      const els={keyword:document.getElementById('keyword'),theme_group:document.getElementById('theme_group'),direction:document.getElementById('direction'),heat_level:document.getElementById('heat_level'),state:document.getElementById('state'),search_btn:document.getElementById('search_btn'),meta:document.getElementById('meta'),list:document.getElementById('list'),page_info:document.getElementById('page_info'),prev_btn:document.getElementById('prev_btn'),next_btn:document.getElementById('next_btn'),sum_total:document.getElementById('sum_total'),sum_bull:document.getElementById('sum_bull'),sum_bear:document.getElementById('sum_bear'),sum_heat:document.getElementById('sum_heat'),download_image_btn:document.getElementById('download_image_btn')};
      const escapeHtml=(s)=>String(s||'').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'",'&#39;');
      const parseList=(raw)=>{try{const x=JSON.parse(raw||'[]');return Array.isArray(x)?x:[]}catch{return[]}};
      function downloadBlob(blob, filename){const url=URL.createObjectURL(blob);const link=document.createElement('a');link.href=url;link.download=filename;document.body.appendChild(link);link.click();link.remove();setTimeout(()=>URL.revokeObjectURL(url),1000)}
      function buildImageName(){const now=new Date();const y=now.getFullYear();const m=String(now.getMonth()+1).padStart(2,'0');const d=String(now.getDate()).padStart(2,'0');return `主题热点引擎_${y}${m}${d}_p${state.page}.png`;}
      function fillSelect(el, items, placeholder, current=''){el.innerHTML=[`<option value="">${placeholder}</option>`].concat((items||[]).map(v=>`<option value="${escapeHtml(v)}"${v===current?' selected':''}>${escapeHtml(v)}</option>`)).join('')}
      function renderList(items){
        if(!items.length){els.list.innerHTML='<div class="empty">暂无主题数据</div>';return;}
        els.list.innerHTML=items.map(it=>{
          const terms=parseList(it.top_terms_json); const stocks=parseList(it.top_stocks_json); const exps=it.market_expectations||[];
          return `<article class="card">
            <div class="card-head">
              <div>
                <div class="title">${escapeHtml(it.theme_name)}</div>
                <div class="sub">${escapeHtml(it.theme_group||'-')} · 证据 ${it.evidence_count||0} · 最近更新时间 ${escapeHtml(it.latest_evidence_time||'-')}</div>
              </div>
              <div class="pill-list">
                <span class="badge ${it.direction==='看多'?'bull':it.direction==='看空'?'bear':''}">${escapeHtml(it.direction||'-')}</span>
                <span class="badge heat">${escapeHtml(it.heat_level||'-')}</span>
                <span class="badge state">${escapeHtml(it.current_state||'-')}</span>
                <span class="badge">热度 ${Number(it.theme_strength||0).toFixed(1)}</span>
                <span class="badge">置信度 ${Number(it.confidence||0).toFixed(1)}%</span>
              </div>
            </div>
            <div class="grid">
              <section class="box">
                <h3>关键词与标的</h3>
                <div class="pill-list">${terms.slice(0,8).map(x=>`<span class="pill">${escapeHtml(x.term)}<strong>${Number(x.weight||0).toFixed(1)}</strong></span>`).join('')||'<span class="muted">暂无</span>'}</div>
                <div style="height:10px"></div>
                <div class="pill-list">${stocks.slice(0,8).map(x=>`<span class="pill">${escapeHtml(x.stock_name||x.ts_code)}<strong>${Number(x.weight||0).toFixed(1)}</strong></span>`).join('')||'<span class="muted">暂无</span>'}</div>
              </section>
              <section class="box">
                <h3>来源构成</h3>
                <div class="sub">国际 ${it.intl_news_count||0} / 国内 ${it.domestic_news_count||0} / 个股 ${it.stock_news_count||0} / 群聊 ${it.chatroom_count||0}</div>
                <div class="sub">驱动来源：${escapeHtml(it.driver_type||'-')} / ${escapeHtml(it.driver_title||'-')}</div>
                <div class="actions" style="margin-top:12px;">
                  <a href="/signal_state_timeline.html?signal_scope=theme&signal_key=${encodeURIComponent('theme:'+String(it.theme_name||''))}">查看状态时间线</a>
                  <a href="/research_reports.html?report_type=theme&keyword=${encodeURIComponent(it.theme_name||'')}" style="margin-left:10px;">查看相关报告</a>
                </div>
              </section>
              <section class="box">
                <h3>市场预期层</h3>
                <div class="expect">${exps.slice(0,4).map(x=>`<div class="expect-item"><div class="expect-q">${escapeHtml(x.question)}</div><div class="expect-m">成交量 ${Number(x.volume||0).toFixed(0)} · 流动性 ${Number(x.liquidity||0).toFixed(0)}</div></div>`).join('')||'<div class="muted">暂无匹配的市场预期</div>'}</div>
              </section>
            </div>
          </article>`;
        }).join('');
      }
      async function fetchData(){
        const q=new URLSearchParams({keyword:state.keyword,theme_group:state.theme_group,direction:state.direction,heat_level:state.heat_level,state:state.state_filter,page:String(state.page),page_size:String(state.page_size)});
        els.meta.textContent='查询中...';
        try{
          const res=await fetch(`${API_BASE}/api/theme-hotspots?${q.toString()}`); const data=await res.json(); if(!res.ok) throw new Error(data.error||'请求失败');
          state.total_pages=data.total_pages||1; renderList(data.items||[]);
          fillSelect(els.theme_group,data.filters?.theme_groups||[],'全部分组',state.theme_group); fillSelect(els.direction,data.filters?.directions||[],'全部方向',state.direction); fillSelect(els.heat_level,data.filters?.heat_levels||[],'全部热度',state.heat_level); fillSelect(els.state,data.filters?.states||[],'全部状态',state.state_filter);
          els.sum_total.textContent=String(data.summary?.theme_total??0); els.sum_bull.textContent=String(data.summary?.bullish_total??0); els.sum_bear.textContent=String(data.summary?.bearish_total??0); els.sum_heat.textContent=String(data.summary?.high_heat_total??0);
          els.page_info.textContent=`第 ${state.page} / ${Math.max(state.total_pages,1)} 页`; els.prev_btn.disabled=state.page<=1; els.next_btn.disabled=state.page>=state.total_pages;
          els.meta.textContent=`共 ${data.total||0} 个主题，API: ${API_BASE}`;
        }catch(err){els.list.innerHTML=`<div class="empty">请求失败: ${escapeHtml(err.message)}</div>`;els.meta.textContent=`请求失败: ${err.message}`;}
      }
      async function downloadCurrentListAsImage(){
        if(typeof html2canvas!=='function'){alert('html2canvas 未加载，暂时无法下载图片');return;}
        const target=document.querySelector('.panel'); if(!target) return;
        const oldText=els.download_image_btn.textContent; els.download_image_btn.disabled=true; els.download_image_btn.textContent='导出中...';
        try{
          const canvas=await html2canvas(target,{backgroundColor:'#f8fafc',scale:Math.min(window.devicePixelRatio||1,2)*2,useCORS:true});
          const blob=await new Promise((resolve)=>canvas.toBlob(resolve,'image/png'));
          if(!blob) throw new Error('图片生成失败');
          downloadBlob(blob,buildImageName());
        }catch(err){alert(`下载失败: ${err.message}`);}
        finally{els.download_image_btn.disabled=false; els.download_image_btn.textContent=oldText;}
      }
      els.search_btn.addEventListener('click',()=>{state.keyword=els.keyword.value.trim();state.theme_group=els.theme_group.value;state.direction=els.direction.value;state.heat_level=els.heat_level.value;state.state_filter=els.state.value;state.page=1;fetchData();});
      els.prev_btn.addEventListener('click',()=>{if(state.page>1){state.page-=1;fetchData();}});
      els.next_btn.addEventListener('click',()=>{if(state.page<state.total_pages){state.page+=1;fetchData();}});
      els.download_image_btn.addEventListener('click',downloadCurrentListAsImage);
      fetchData();
    </script>
  </body>
</html>
