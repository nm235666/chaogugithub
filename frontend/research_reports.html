<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>标准投研报告</title>
    <style>
      :root{--bg:#f8fafc;--card:#fff;--text:#0f172a;--muted:#475569;--primary:#0f766e;--primary-dark:#115e59;--border:#d7dee6;--shadow:0 12px 30px rgba(15,23,42,.06)}
      *{box-sizing:border-box} body{margin:0;font-family:"Noto Sans SC","PingFang SC","Microsoft YaHei",sans-serif;color:var(--text);background:radial-gradient(circle at 0% 0%,#dcfce7 0%,transparent 34%),radial-gradient(circle at 100% 100%,#dbeafe 0%,transparent 42%),var(--bg)}
      .wrap{max-width:1400px;margin:24px auto 40px;padding:0 16px}.panel{background:var(--card);border:1px solid var(--border);border-radius:18px;box-shadow:var(--shadow);padding:18px}
      .topbar,.layout,.nav,.pager,.detail-actions{display:flex;gap:12px;flex-wrap:wrap}.topbar,.pager{justify-content:space-between;align-items:flex-start}
      h1{margin:0;font-size:28px}.sub,.meta{color:var(--muted);font-size:14px;line-height:1.7}.nav a{color:var(--primary);text-decoration:none;font-size:14px;margin-left:10px}
      .toolbar{margin-top:16px;display:grid;grid-template-columns:150px 160px 1fr 110px;gap:10px} input,select,button{height:42px;border-radius:12px;border:1px solid var(--border);padding:0 12px;font-size:14px;background:#fff} button{border:none;background:var(--primary);color:#fff;cursor:pointer} button:hover{background:var(--primary-dark)}
      .layout{margin-top:16px;display:grid;grid-template-columns:360px 1fr;gap:14px}.sidebar,.detail{border:1px solid var(--border);border-radius:16px;background:#fff;padding:14px}
      .detail-actions{justify-content:flex-end;margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid #eef2f7}.ghost-btn{background:#f8fafc;color:var(--text);border:1px solid var(--border)}.ghost-btn:hover{background:#eef2f7}
      .report-item{border:1px solid var(--border);border-radius:14px;padding:12px;cursor:pointer;background:#fff;margin-bottom:10px}.report-item.active{border-color:var(--primary);box-shadow:0 0 0 2px rgba(15,118,110,.12)}
      .report-title{font-size:16px;font-weight:700}.badge{display:inline-flex;align-items:center;padding:6px 10px;border-radius:999px;font-size:12px;font-weight:700;border:1px solid #d6dde7;background:#f8fafc;color:#334155}
      .detail h2{margin:0 0 8px}.markdown{margin-top:12px;line-height:1.8}.expect{margin-top:14px;border:1px solid var(--border);border-radius:14px;padding:12px;background:#f8fafc}.expect-item{padding:8px 0;border-top:1px solid #e2e8f0}.expect-item:first-child{border-top:none}
      .pager{margin-top:12px}.empty{padding:24px;text-align:center;color:var(--muted);border:1px dashed var(--border);border-radius:14px}
      @media (max-width:1000px){.layout,.toolbar{grid-template-columns:1fr}}
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="panel">
        <div class="topbar">
          <div><h1>标准投研报告</h1><div class="sub">统一查看股票、主题、市场总览三类模板化报告，并叠加市场预期层。</div></div>
          <div class="nav"><a href="/index.html">首页</a><a href="/theme_hotspots.html">主题引擎</a><a href="/multi_role_review.html">多角色分析</a></div>
        </div>
        <div class="toolbar">
          <select id="report_type"><option value="">全部类型</option><option value="stock">股票</option><option value="theme">主题</option><option value="market">市场</option></select>
          <input id="report_date" placeholder="YYYY-MM-DD" />
          <input id="keyword" placeholder="搜索主题 / 股票 / 报告内容" />
          <button id="search_btn">查询</button>
        </div>
        <div class="meta" id="meta">准备就绪</div>
        <div class="layout">
          <section class="sidebar">
            <div id="list"></div>
            <div class="pager"><button id="prev_btn">上一页</button><div id="page_info">第 1 / 1 页</div><button id="next_btn">下一页</button></div>
          </section>
          <section class="detail">
            <div class="detail-actions">
              <button id="download_md_btn" class="ghost-btn" disabled>下载 Markdown</button>
              <button id="download_image_btn" class="ghost-btn" disabled>下载为图片</button>
            </div>
            <div id="detail"></div>
          </section>
        </div>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <script>
      const API_BASE=(location.hostname==='localhost'||location.hostname==='127.0.0.1')?'http://127.0.0.1:8077':`http://${location.hostname}:8077`;
      const qs=new URLSearchParams(location.search); const state={report_type:qs.get('report_type')||'',report_date:qs.get('report_date')||'',keyword:qs.get('keyword')||'',page:1,page_size:20,total_pages:1,items:[],activeId:null};
      const els={report_type:document.getElementById('report_type'),report_date:document.getElementById('report_date'),keyword:document.getElementById('keyword'),search_btn:document.getElementById('search_btn'),meta:document.getElementById('meta'),list:document.getElementById('list'),detail:document.getElementById('detail'),page_info:document.getElementById('page_info'),prev_btn:document.getElementById('prev_btn'),next_btn:document.getElementById('next_btn'),download_md_btn:document.getElementById('download_md_btn'),download_image_btn:document.getElementById('download_image_btn')};
      els.report_type.value=state.report_type; els.report_date.value=state.report_date; els.keyword.value=state.keyword;
      const escapeHtml=(s)=>String(s||'').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'",'&#39;');
      function downloadText(content, filename, type='text/plain;charset=utf-8'){const blob=new Blob([content],{type});const url=URL.createObjectURL(blob);const link=document.createElement('a');link.href=url;link.download=filename;document.body.appendChild(link);link.click();link.remove();setTimeout(()=>URL.revokeObjectURL(url),1000)}
      function currentItem(){return (state.items||[]).find(x=>x.id===state.activeId)||null}
      function buildBaseName(item){return `${String(item?.subject_name||item?.subject_key||'report').replace(/[^\w\u4e00-\u9fa5-]+/g,'_')}_${item?.report_date||'unknown'}_标准投研报告`;}
      function renderList(){
        if(!state.items.length){els.download_md_btn.disabled=true; els.download_image_btn.disabled=true; els.list.innerHTML='<div class="empty">暂无报告</div>';els.detail.innerHTML='<div class="empty">请选择或先生成报告</div>';return;}
        els.list.innerHTML=state.items.map(it=>`<article class="report-item ${state.activeId===it.id?'active':''}" data-id="${it.id}">
          <div class="report-title">${escapeHtml(it.subject_name||it.subject_key||'-')}</div>
          <div class="meta">${escapeHtml(it.report_date||'-')} · <span class="badge">${escapeHtml(it.report_type||'-')}</span> · ${escapeHtml(it.model||'-')}</div>
        </article>`).join('');
        document.querySelectorAll('.report-item').forEach(node=>node.addEventListener('click',()=>{state.activeId=Number(node.dataset.id);renderList();renderDetail((state.items||[]).find(x=>x.id===state.activeId));}));
        if(!state.activeId){state.activeId=state.items[0]?.id||null;} renderDetail((state.items||[]).find(x=>x.id===state.activeId));
      }
      function renderDetail(item){
        if(!item){els.download_md_btn.disabled=true; els.download_image_btn.disabled=true; els.detail.innerHTML='<div class="empty">请选择报告</div>';return;}
        marked.setOptions({gfm:true,breaks:true});
        els.download_md_btn.disabled=false; els.download_image_btn.disabled=false;
        els.detail.innerHTML=`<h2>${escapeHtml(item.subject_name||item.subject_key||'-')}</h2>
          <div class="meta">${escapeHtml(item.report_date||'-')} · ${escapeHtml(item.report_type||'-')} · ${escapeHtml(item.model||'-')}</div>
          <div class="expect"><strong>市场预期层</strong>${(item.market_expectations||[]).map(x=>`<div class="expect-item"><div>${escapeHtml(x.question)}</div><div class="meta">成交量 ${Number(x.volume||0).toFixed(0)} · 流动性 ${Number(x.liquidity||0).toFixed(0)}</div></div>`).join('')||'<div class="meta" style="margin-top:8px;">暂无匹配市场预期</div>'}</div>
          <div class="markdown">${marked.parse(item.markdown_content||'')}</div>`;
      }
      async function fetchData(){
        const q=new URLSearchParams({report_type:state.report_type,report_date:state.report_date,keyword:state.keyword,page:String(state.page),page_size:String(state.page_size)});
        els.meta.textContent='查询中...';
        try{
          const res=await fetch(`${API_BASE}/api/research-reports?${q.toString()}`); const data=await res.json(); if(!res.ok) throw new Error(data.error||'请求失败');
          state.items=data.items||[]; state.total_pages=data.total_pages||1; if(!(state.items||[]).some(x=>x.id===state.activeId)) state.activeId=state.items[0]?.id||null;
          renderList(); els.page_info.textContent=`第 ${state.page} / ${Math.max(state.total_pages,1)} 页`; els.prev_btn.disabled=state.page<=1; els.next_btn.disabled=state.page>=state.total_pages;
          els.meta.textContent=`共 ${data.total||0} 份报告，API: ${API_BASE}`;
        }catch(err){els.download_md_btn.disabled=true; els.download_image_btn.disabled=true; els.list.innerHTML=`<div class="empty">请求失败: ${escapeHtml(err.message)}</div>`; els.detail.innerHTML=''; els.meta.textContent=`请求失败: ${err.message}`;}
      }
      function downloadCurrentMarkdown(){const item=currentItem(); if(!item) return; downloadText(item.markdown_content||'',`${buildBaseName(item)}.md`,'text/markdown;charset=utf-8');}
      async function downloadCurrentImage(){
        const item=currentItem(); if(!item) return;
        if(typeof html2canvas!=='function'){alert('html2canvas 未加载，暂时无法下载图片');return;}
        const target=els.detail; const oldText=els.download_image_btn.textContent; els.download_image_btn.disabled=true; els.download_image_btn.textContent='导出中...';
        try{
          const canvas=await html2canvas(target,{backgroundColor:'#ffffff',scale:Math.min(window.devicePixelRatio||1,2)*2,useCORS:true});
          const blob=await new Promise((resolve)=>canvas.toBlob(resolve,'image/png'));
          if(!blob) throw new Error('图片生成失败');
          const url=URL.createObjectURL(blob); const link=document.createElement('a'); link.href=url; link.download=`${buildBaseName(item)}.png`; document.body.appendChild(link); link.click(); link.remove(); setTimeout(()=>URL.revokeObjectURL(url),1000);
        }catch(err){alert(`下载失败: ${err.message}`);}
        finally{els.download_image_btn.disabled=false; els.download_image_btn.textContent=oldText;}
      }
      els.search_btn.addEventListener('click',()=>{state.report_type=els.report_type.value;state.report_date=els.report_date.value.trim();state.keyword=els.keyword.value.trim();state.page=1;fetchData();});
      els.prev_btn.addEventListener('click',()=>{if(state.page>1){state.page-=1;fetchData();}}); els.next_btn.addEventListener('click',()=>{if(state.page<state.total_pages){state.page+=1;fetchData();}});
      els.download_md_btn.addEventListener('click',downloadCurrentMarkdown);
      els.download_image_btn.addEventListener('click',downloadCurrentImage);
      fetchData();
    </script>
  </body>
</html>
