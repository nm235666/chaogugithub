<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>数据库审核报告</title>
    <style>
      :root {
        --bg: #f8fafc;
        --card: #ffffff;
        --text: #0f172a;
        --muted: #475569;
        --primary: #0f766e;
        --primary-dark: #115e59;
        --border: #d7dee6;
        --ok-bg: #ecfdf5;
        --ok-text: #065f46;
        --warn-bg: #fff7ed;
        --warn-text: #9a3412;
        --hint-bg: #eff6ff;
        --hint-text: #1d4ed8;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at 0% 0%, #dff7f3 0%, transparent 36%),
          radial-gradient(circle at 100% 100%, #e5edff 0%, transparent 42%),
          var(--bg);
      }
      .wrap { max-width: 1280px; margin: 24px auto; padding: 0 16px; }
      .panel { background: var(--card); border: 1px solid var(--border); border-radius: 18px; padding: 16px; }
      .topbar { display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
      .actions { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
      .link { color: var(--primary); text-decoration: none; font-size: 14px; }
      button {
        height: 40px;
        border: none;
        border-radius: 10px;
        padding: 0 14px;
        font-size: 14px;
        color: #fff;
        background: var(--primary);
        cursor: pointer;
      }
      button:hover { background: var(--primary-dark); }
      .meta { margin-top: 10px; color: var(--muted); font-size: 13px; line-height: 1.7; }
      .summary-grid {
        margin-top: 14px;
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 10px;
      }
      .health-grid {
        margin-top: 12px;
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 10px;
      }
      .stat-card {
        padding: 14px;
        border: 1px solid var(--border);
        border-radius: 14px;
        background: linear-gradient(180deg, #ffffff 0%, #f8fafc 100%);
      }
      .stat-label { font-size: 12px; color: var(--muted); }
      .stat-value { margin-top: 6px; font-size: 28px; font-weight: 700; }
      .stat-value.small { font-size: 20px; }
      .sections {
        margin-top: 16px;
        display: grid;
        grid-template-columns: 320px 1fr;
        gap: 12px;
      }
      .box {
        border: 1px solid var(--border);
        border-radius: 16px;
        background: #fff;
        padding: 14px;
      }
      .box h3 {
        margin: 0 0 12px;
        font-size: 18px;
      }
      .badge {
        display: inline-flex;
        align-items: center;
        padding: 6px 10px;
        border-radius: 999px;
        font-size: 12px;
        font-weight: 700;
      }
      .badge-ok { background: var(--ok-bg); color: var(--ok-text); }
      .badge-warn { background: var(--warn-bg); color: var(--warn-text); }
      .badge-hint { background: var(--hint-bg); color: var(--hint-text); }
      .legend { display: grid; gap: 10px; }
      .tools {
        margin-top: 12px;
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }
      .tools input {
        flex: 1;
        min-width: 220px;
        height: 40px;
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 0 12px;
        font-size: 14px;
      }
      .filter-btn {
        background: #fff;
        color: var(--text);
        border: 1px solid var(--border);
      }
      .filter-btn.active {
        background: var(--primary);
        color: #fff;
        border-color: var(--primary);
      }
      .legend-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 10px 12px;
        border: 1px solid var(--border);
        border-radius: 12px;
      }
      .markdown-body {
        line-height: 1.9;
        color: #1f2937;
        font-size: 15px;
      }
      .markdown-body h1, .markdown-body h2, .markdown-body h3, .markdown-body h4 {
        margin: 10px 0 8px;
        line-height: 1.45;
      }
      .markdown-body ul, .markdown-body ol { padding-left: 22px; }
      .markdown-body table {
        width: 100%;
        border-collapse: collapse;
        display: block;
        overflow-x: auto;
      }
      .markdown-body th, .markdown-body td {
        border: 1px solid #e2e8f0;
        padding: 8px 10px;
        text-align: left;
        white-space: nowrap;
      }
      .markdown-body tr:nth-child(even) { background: #f8fafc; }
      .empty {
        padding: 24px 12px;
        text-align: center;
        color: var(--muted);
      }
      @media (max-width: 1024px) {
        .summary-grid { grid-template-columns: 1fr 1fr; }
        .health-grid { grid-template-columns: 1fr 1fr; }
        .sections { grid-template-columns: 1fr; }
      }
      @media (max-width: 640px) {
        .summary-grid { grid-template-columns: 1fr; }
        .health-grid { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="panel">
        <div class="topbar">
          <h1>数据库审核报告</h1>
          <div class="actions">
            <a class="link" href="/index.html">返回首页</a>
            <a class="link" href="/source_monitor.html">数据源监控</a>
            <button id="refresh_btn">立即刷新报告</button>
          </div>
        </div>
        <div class="meta" id="meta">准备加载审核报告...</div>

        <div class="summary-grid">
          <div class="stat-card">
            <div class="stat-label">正常</div>
            <div class="stat-value" id="stat_ok">-</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">警告</div>
            <div class="stat-value" id="stat_warn">-</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">提示</div>
            <div class="stat-value" id="stat_hint">-</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">本次覆盖表数</div>
            <div class="stat-value small" id="stat_total">-</div>
          </div>
        </div>

        <div class="health-grid">
          <div class="stat-card">
            <div class="stat-label">未评分国际/国内新闻</div>
            <div class="stat-value" id="health_news_unscored">-</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">未评分个股新闻</div>
            <div class="stat-value" id="health_stock_news_unscored">-</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">缺治理 / 缺事件 / 缺资金流</div>
            <div class="stat-value small" id="health_core_gaps">-</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">重复新闻 / 重复聊天</div>
            <div class="stat-value small" id="health_dup_counts">-</div>
          </div>
        </div>

        <div class="tools">
          <input id="search_box" placeholder="过滤审核报告内容，如 输入 stock_news_items / 未评分 / 群聊链" />
          <button class="filter-btn active" data-level="all">全部</button>
          <button class="filter-btn" data-level="警告">只看警告</button>
          <button class="filter-btn" data-level="提示">只看提示</button>
          <button class="filter-btn" data-level="正常">只看正常</button>
        </div>

        <div class="sections">
          <div class="box">
            <h3>状态图例</h3>
            <div class="legend">
              <div class="legend-row">
                <span class="badge badge-ok">正常</span>
                <span>表结构和关键数据检查通过</span>
              </div>
              <div class="legend-row">
                <span class="badge badge-warn">警告</span>
                <span>存在缺口、重复或未评分等问题</span>
              </div>
              <div class="legend-row">
                <span class="badge badge-hint">提示</span>
                <span>需要继续补数或进一步核验</span>
              </div>
            </div>
          </div>
          <div class="box">
            <h3>审核详情</h3>
            <div class="markdown-body" id="detail">
              <div class="empty">正在读取报告...</div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="/admin_auth.js"></script>
    <script>
      const API_BASE = (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1')
        ? 'http://127.0.0.1:8077'
        : `http://${window.location.hostname}:8077`;

      const els = {
        meta: document.getElementById('meta'),
        refresh_btn: document.getElementById('refresh_btn'),
        stat_ok: document.getElementById('stat_ok'),
        stat_warn: document.getElementById('stat_warn'),
        stat_hint: document.getElementById('stat_hint'),
        stat_total: document.getElementById('stat_total'),
        health_news_unscored: document.getElementById('health_news_unscored'),
        health_stock_news_unscored: document.getElementById('health_stock_news_unscored'),
        health_core_gaps: document.getElementById('health_core_gaps'),
        health_dup_counts: document.getElementById('health_dup_counts'),
        search_box: document.getElementById('search_box'),
        detail: document.getElementById('detail'),
      };
      const filterButtons = Array.from(document.querySelectorAll('.filter-btn'));
      let latestMarkdown = '';
      let activeLevel = 'all';

      function escapeHtml(str) {
        return String(str || '')
          .replaceAll('&', '&amp;')
          .replaceAll('<', '&lt;')
          .replaceAll('>', '&gt;')
          .replaceAll('"', '&quot;')
          .replaceAll("'", '&#39;');
      }

      function renderSummary(summary) {
        const s = summary || {};
        els.stat_ok.textContent = s['正常'] ?? '-';
        els.stat_warn.textContent = s['警告'] ?? '-';
        els.stat_hint.textContent = s['提示'] ?? '-';
        els.stat_total.textContent = s.total ?? '-';
      }

      function renderHealth(health) {
        const h = health || {};
        els.health_news_unscored.textContent = String(h.news_unscored ?? '-');
        els.health_stock_news_unscored.textContent = String(h.stock_news_unscored ?? '-');
        els.health_core_gaps.textContent = `${h.miss_governance ?? '-'} / ${h.miss_events ?? '-'} / ${h.miss_flow ?? '-'}`;
        els.health_dup_counts.textContent = `${h.news_dup_link ?? '-'} / ${h.stock_news_dup_link ?? '-'} / ${h.chatlog_dup_key ?? '-'}`;
      }

      function filterMarkdown(markdown) {
        const keyword = (els.search_box.value || '').trim().toLowerCase();
        let lines = (markdown || '').split('\n');
        if (activeLevel !== 'all') {
          lines = lines.filter((line) => {
            if (!line.includes('|')) return true;
            return line.includes(`| ${activeLevel} |`);
          });
        }
        if (keyword) {
          lines = lines.filter((line) => line.toLowerCase().includes(keyword) || line.startsWith('#') || line.startsWith('##') || line.startsWith('###') || line.startsWith('####'));
        }
        return lines.join('\n');
      }

      function renderMarkdown() {
        els.detail.innerHTML = marked.parse(filterMarkdown(latestMarkdown) || '');
      }

      async function loadAudit(refresh = false) {
        els.meta.textContent = refresh ? '正在重新生成并读取审核报告...' : '正在读取审核报告...';
        els.refresh_btn.disabled = true;
        try {
          const [auditResp, healthResp] = await Promise.all([
            (refresh ? zanboAdminFetch(`${API_BASE}/api/database-audit?refresh=1`) : fetch(`${API_BASE}/api/database-audit?refresh=0`)),
            fetch(`${API_BASE}/api/db-health`),
          ]);
          const data = await auditResp.json();
          const health = await healthResp.json();
          if (!auditResp.ok) {
            throw new Error(data.error || '请求失败');
          }
          renderSummary(data.summary);
          renderHealth(health);
          els.meta.textContent = `报告路径: ${data.path} | 生成时间(UTC): ${data.generated_at}`;
          latestMarkdown = data.markdown || '';
          renderMarkdown();
        } catch (err) {
          els.meta.textContent = `读取失败: ${err.message}`;
          els.detail.innerHTML = `<div class="empty">${escapeHtml(err.message)}</div>`;
        } finally {
          els.refresh_btn.disabled = false;
        }
      }

      els.refresh_btn.addEventListener('click', () => loadAudit(true));
      els.search_box.addEventListener('input', renderMarkdown);
      filterButtons.forEach((btn) => {
        btn.addEventListener('click', () => {
          activeLevel = btn.dataset.level || 'all';
          filterButtons.forEach((item) => item.classList.toggle('active', item === btn));
          renderMarkdown();
        });
      });

      loadAudit(false);
    </script>
  </body>
</html>
